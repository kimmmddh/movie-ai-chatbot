version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: movie-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama

  php-web:
    build: ./backend
    container_name: movie-php
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    depends_on:
      - ollama